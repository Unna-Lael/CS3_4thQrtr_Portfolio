<!DOCTYPE html>
<html>
<head>
<title>Q4 2nd Graded Exercise</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(-45deg,#9f7aea,#f472b6,#c084fc,#f9a8d4);
  background-size:400% 400%;
  animation:gradientMove 15s ease infinite;
  min-height:100vh;
  overflow-x:hidden;
}

/* grid overlay */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}

/* sparkles */
.sparkle{
  position:fixed;
  bottom:-20px;
  width:6px;
  height:6px;
  background:white;
  border-radius:50%;
  opacity:.6;
  animation:floatUp linear infinite;
  z-index:0;
  pointer-events:none;
}

@keyframes floatUp{
  0%{transform:translateY(0);opacity:.6;}
  100%{transform:translateY(-110vh);opacity:0;}
}

@keyframes gradientMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* container */
.container{
  position:relative;
  z-index:1;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(14px);
  max-width:700px;
  margin:60px auto;
  padding:40px;
  border-radius:22px;
  box-shadow:
    0 25px 60px rgba(0,0,0,.15),
    inset 0 0 0 1px rgba(255,255,255,.5);
}

.header{
  text-align:center;
  margin-bottom:30px;
}

.header h1{
  margin:0;
  font-size:30px;
  color:#5b21b6;
}

.movie-count{
  margin-top:6px;
  font-size:13px;
  color:#6b7280;
}

input,select{
  width:100%;
  padding:11px;
  border-radius:12px;
  border:1px solid #e9d5ff;
  margin-top:6px;
  background:#faf5ff;
  font-family:'Poppins';
  transition:.25s;
}

input:focus,select:focus{
  outline:none;
  border-color:#c084fc;
  box-shadow:0 0 12px rgba(192,132,252,.4);
  background:white;
}

button{
  background:linear-gradient(135deg,#9333ea,#ec4899);
  border:none;
  padding:10px 18px;
  color:white;
  border-radius:12px;
  font-weight:500;
  cursor:pointer;
  transition:.25s;
  box-shadow:0 6px 18px rgba(168,85,247,.3);
}

button:hover{
  transform:translateY(-2px) scale(1.05);
}

/* ⭐ IMPROVED STAR ANIMATION (from second code) */
.star{
  width:42px;
  cursor:pointer;
  transition:.25s;
}

.star path{
  fill:#e5e5e5;
  transition:fill .3s ease, filter .3s ease;
}

.star.hovered path,
.star.selected path{
  fill:gold;
  filter:drop-shadow(0 0 8px gold);
}

.star:hover{
  transform:scale(1.2) rotate(-6deg);
}

/* movie section */
.list-box{
  margin-top:30px;
  padding:20px;
  border-radius:16px;
  background:linear-gradient(135deg,#faf5ff,#fdf4ff);
  box-shadow:inset 0 0 0 1px rgba(168,85,247,.15);
}

.movie-card{
  background:white;
  padding:20px;
  margin-top:15px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
  transition:.25s;
}

.movie-card:hover{
  transform:translateY(-4px);
}

.movie-title{
  font-weight:600;
  font-size:19px;
  color:#4c1d95;
}

.genre{
  display:inline-block;
  margin-top:6px;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  background:#ede9fe;
  color:#5b21b6;
}

.rating-badge{
  margin-top:8px;
  display:inline-block;
  background:#fef3c7;
  color:#92400e;
  padding:5px 10px;
  border-radius:10px;
  font-size:14px;
}

.movie-buttons{
  margin-top:14px;
  display:flex;
  gap:10px;
}

/* shared style */
.movie-buttons button{
  border:none;
  padding:7px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
  transition:all .25s ease;
  color:white;
  box-shadow:0 6px 14px rgba(0,0,0,.12);
}

/* edit button */
.editBtn{
  background:linear-gradient(135deg,#6366f1,#818cf8);
}

.editBtn:hover{
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 8px 18px rgba(99,102,241,.35);
}

/* delete button */
.deleteBtn{
  background:linear-gradient(135deg,#ef4444,#f87171);
}

.deleteBtn:hover{
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 8px 18px rgba(239,68,68,.35);
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>🎬 Movie Tracker</h1>
<div class="movie-count" id="movieCount">0 movies saved</div>
</div>

<h2>Add Movie</h2>

<form id="movieForm">

<label>Title</label>
<input type="text" id="title" required>

<br><br>

<label>Genre</label>

<select id="genre">

<option>Action</option>
<option>Adventure</option>
<option>Animation</option>
<option>Biography</option>
<option>Comedy</option>
<option>Crime</option>
<option>Documentary</option>
<option>Drama</option>
<option>Family</option>
<option>Fantasy</option>
<option>Historical</option>
<option>Horror</option>
<option>Kids</option>
<option>Musical</option>
<option>Mystery</option>
<option>Psychological</option>
<option>Romance</option>
<option>Sci-Fi</option>
<option>Sports</option>
<option>Superhero</option>
<option>Thriller</option>
<option>War</option>
<option>Western</option>
<option>Slapstick</option>
<option>Feel-Good</option>
<option>Indie</option>
<option>Noir</option>
<option>Coming-of-Age</option>
<option>Satire</option>
<option>Parody</option>
<option>Dark Comedy</option>
<option>Rom-Com</option>
<option>Disaster</option>
<option>Apocalyptic</option>
<option>Cyberpunk</option>
<option>Martial Arts</option>
<option>Survival</option>
<option>Epic</option>

</select>

<br><br>

<label>Rating</label>

<div id="starContainer">

<svg class="star" data-value="1" viewBox="0 0 24 24">
<path d="M12 2 L15 9 L22 9 L17 14 L19 21 L12 17 L5 21 L7 14 L2 9 L9 9 Z"/>
</svg>

<svg class="star" data-value="2" viewBox="0 0 24 24">
<path d="M12 2 L15 9 L22 9 L17 14 L19 21 L12 17 L5 21 L7 14 L2 9 L9 9 Z"/>
</svg>

<svg class="star" data-value="3" viewBox="0 0 24 24">
<path d="M12 2 L15 9 L22 9 L17 14 L19 21 L12 17 L5 21 L7 14 L2 9 L9 9 Z"/>
</svg>

<svg class="star" data-value="4" viewBox="0 0 24 24">
<path d="M12 2 L15 9 L22 9 L17 14 L19 21 L12 17 L5 21 L7 14 L2 9 L9 9 Z"/>
</svg>

<svg class="star" data-value="5" viewBox="0 0 24 24">
<path d="M12 2 L15 9 L22 9 L17 14 L19 21 L12 17 L5 21 L7 14 L2 9 L9 9 Z"/>
</svg>

</div>

<br>

<button type="submit">Add Movie</button>

</form>

<div class="list-box">
<h2>Movie List</h2>
<div id="movieList"></div>
</div>

</div>

<script>

/* sparkles */
for(let i=0;i<30;i++){
const sparkle=document.createElement("div")
sparkle.className="sparkle"
sparkle.style.left=Math.random()*100+"vw"
sparkle.style.animationDuration=(8+Math.random()*6)+"s"
sparkle.style.opacity=Math.random()
document.body.appendChild(sparkle)
}

let selectedRating=0
const stars=document.querySelectorAll(".star")

stars.forEach(star=>{
star.addEventListener("mouseover",function(){
let val=this.dataset.value
stars.forEach(s=>s.classList.remove("hovered"))
for(let i=0;i<val;i++) stars[i].classList.add("hovered")
})

star.addEventListener("mouseout",function(){
stars.forEach(s=>s.classList.remove("hovered"))
})

star.addEventListener("click",function(){
selectedRating=parseInt(this.dataset.value)
stars.forEach(s=>s.classList.remove("selected"))
for(let i=0;i<selectedRating;i++) stars[i].classList.add("selected")
})
})

document.getElementById("movieForm").addEventListener("submit",function(e){

e.preventDefault()

const title=document.getElementById("title").value.trim()
const genre=document.getElementById("genre").value

let movies=JSON.parse(localStorage.getItem("movies"))||[]

let index=movies.findIndex(m=>m.title.toLowerCase()===title.toLowerCase())

if(index!==-1){
let oldRating=movies[index].rating
let newRating=selectedRating
movies[index].rating=Math.round((oldRating+newRating)/2)
movies[index].genre=genre
}
else{
movies.push({title,genre,rating:selectedRating})
}

localStorage.setItem("movies",JSON.stringify(movies))

displayMovies()

this.reset()
selectedRating=0
stars.forEach(s=>s.classList.remove("selected"))

})

function displayMovies(){

const movieList=document.getElementById("movieList")
movieList.innerHTML=""

let movies=JSON.parse(localStorage.getItem("movies"))||[]

document.getElementById("movieCount").innerText = movies.length + " movies saved"

movies.forEach((movie,i)=>{

let div=document.createElement("div")
div.className="movie-card"

div.innerHTML=`
<div class="movie-title">${movie.title}</div>
<div class="genre">${movie.genre}</div>
<div class="rating-badge">${"⭐".repeat(movie.rating)}</div>

<div class="movie-buttons">
<button class="editBtn" onclick="editMovie(${i})">Edit</button>
<button class="deleteBtn" onclick="deleteMovie(${i})">Delete</button>
</div>
`

movieList.appendChild(div)

})

}

function deleteMovie(index){

if(confirm("Are you sure you want to delete this movie?")){

let movies=JSON.parse(localStorage.getItem("movies"))||[]
movies.splice(index,1)

localStorage.setItem("movies",JSON.stringify(movies))

displayMovies()

}

}

function editMovie(index){

let movies=JSON.parse(localStorage.getItem("movies"))||[]
let movie=movies[index]

document.getElementById("title").value=movie.title
document.getElementById("genre").value=movie.genre

selectedRating=movie.rating

stars.forEach(s=>s.classList.remove("selected"))

for(let i=0;i<selectedRating;i++) stars[i].classList.add("selected")

window.scrollTo({top:0,behavior:"smooth"})

}

displayMovies()

</script>

</body>
</html>
